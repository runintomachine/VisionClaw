name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secrets.swift
        run: |
          cat > samples/CameraAccess/CameraAccess/Secrets.swift << 'SWIFT'
          import Foundation

          enum Secrets {
            static let geminiAPIKey = ""
            static let openClawHost = "http://MacBook-Pro.local"
            static let openClawPort = 18789
            static let openClawHookToken = ""
            static let openClawGatewayToken = ""
            static let webrtcSignalingURL = "ws://172.20.10.5:8080"
          }
          SWIFT

      - name: Build
        run: |
          cd samples/CameraAccess
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/CameraAccess.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ASSETCATALOG_COMPILER_OPTIMIZATION=nothing \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-Build
          path: samples/CameraAccess/build/CameraAccess.xcarchive
          retention-days: 7
