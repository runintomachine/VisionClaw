name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secrets.swift
        run: |
          cat > samples/CameraAccess/CameraAccess/Secrets.swift << 'SWIFT'
          import Foundation

          enum Secrets {
            static let geminiAPIKey = ""
            static let openClawHost = "http://MacBook-Pro.local"
            static let openClawPort = 18789
            static let openClawHookToken = ""
            static let openClawGatewayToken = ""
            static let webrtcSignalingURL = "ws://MacBook-Pro.local:8080"
          }
          SWIFT

      - name: Build
        run: |
          cd samples/CameraAccess
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/CameraAccess.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ASSETCATALOG_COMPILER_OPTIMIZATION=nothing \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          cd samples/CameraAccess
          mkdir -p build/Payload
          cp -r build/CameraAccess.xcarchive/Products/Applications/CameraAccess.app build/Payload/
          cd build
          zip -r VisionClaw.ipa Payload
          echo "IPA size: $(du -sh VisionClaw.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: samples/CameraAccess/build/VisionClaw.ipa
          retention-days: 7
