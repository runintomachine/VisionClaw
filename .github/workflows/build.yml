name: Build VisionClaw IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.3
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Install iOS SDK
        run: xcodebuild -downloadPlatform iOS

      - name: Create Secrets.swift
        run: |
          cp samples/CameraAccess/CameraAccess/Secrets.swift.example samples/CameraAccess/CameraAccess/Secrets.swift
          sed -i '' 's/YOUR_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/' samples/CameraAccess/CameraAccess/Secrets.swift

      - name: Build
        run: |
          cd samples/CameraAccess
          xcodebuild \
            -project CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/CameraAccess.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ASSETCATALOG_COMPILER_OPTIMIZATION=nothing \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-Build
          path: samples/CameraAccess/build/CameraAccess.xcarchive
          retention-days: 7
